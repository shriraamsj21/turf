{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container d-flex flex-column justify-content-center align-items-center text-white"
     style="min-height: 85vh;">

    <h2 class="mb-4 fw-bold text-center">Student Sign Up</h2>

    {% if error %}
        <div class="alert alert-danger w-100 text-center" style="max-width:400px;">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" class="w-100" style="max-width:400px;">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control bg-transparent text-white border-light"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email ID</label>
            <input
                type="email"
                name="email"
                class="form-control bg-transparent text-white border-light"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                name="password"
                class="form-control bg-transparent text-white border-light"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                class="form-control bg-transparent text-white border-light"
                required>
        </div>

        <button type="submit" class="btn btn-success w-100 fw-bold">
            Continue
        </button>

    </form>

    <div class="mt-3">
        <a href="{% url 'booking:internal_login' %}"
           class="text-warning text-decoration-none fw-bold">
            ← Back to Login
        </a>
    </div>

</div>

{% endblock %}
