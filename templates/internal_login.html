{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container d-flex flex-column justify-content-center align-items-center text-white"
     style="min-height: 85vh;">

    <!-- Page Title -->
    <h3 class="mb-4 fw-bold text-center">Internal Login</h3>

    <!-- Error Message -->
    {% if error %}
        <div class="alert alert-danger text-center w-100 mb-3"
             style="max-width: 320px;">
            {{ error }}
        </div>
    {% endif %}

    <!-- Login Form -->
    <form method="POST" class="w-100" style="max-width: 320px;">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Email ID</label>
            <input
                type="email"
                name="email"
                class="form-control bg-transparent text-white border-light"
                autocomplete="email"
                required
            >
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input
                type="password"
                name="password"
                class="form-control bg-transparent text-white border-light"
                autocomplete="current-password"
                required
            >
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-success w-100 fw-semibold">
            Login
        </button>

        <!-- Signup Link -->
        <div class="text-center mt-3">
            <span class="text-white">New User? </span>
            <a href="{% url 'booking:signup' %}"
               class="text-warning fw-bold text-decoration-none">
                Sign Up
            </a>
        </div>

    </form>

</div>

{% endblock %}
