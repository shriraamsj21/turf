{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Page title -->
  <title>{% block title %}Turf Booking New{% endblock %}</title>

  <!-- MOBILE RESPONSIVE (MOST IMPORTANT LINE) -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap (handles mobile layout) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Gaming Font (only used for heading) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap" rel="stylesheet">


  <style>
    /* Full screen background image */
    body {
      background: url("{% static 'images/turf_bg.jpg' %}") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
    }

    /* Dark overlay for readability */
    .overlay {
      background-color: rgba(0,0,0,0.6);
      min-height: 100vh;
    }

    /* Gaming font class */
    .gaming-font {
        font-family: 'Orbitron', sans-serif;
        font-weight: 800;
        letter-spacing: 6px;
        text-transform: uppercase;
    }

  </style>
</head>

<body>
  <div class="overlay">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
